kind = "web"
previewPath = "/"
title = "ShareChat APM Trends"
version = "1.0.0"
id = "artifacts/sharechat-apm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25233

[services.development]
run = "pnpm --filter @workspace/sharechat-apm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sharechat-apm", "run", "build" ]
publicDir = "artifacts/sharechat-apm/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25233"
BASE_PATH = "/"
