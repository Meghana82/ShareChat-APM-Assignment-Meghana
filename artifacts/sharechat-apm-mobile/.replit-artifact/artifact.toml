kind = "mobile"
previewPath = "/mobile/"
title = "ShareChat APM Mobile"
version = "1.0.0"
id = "artifacts/sharechat-apm-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 24823

[services.development]
run = "pnpm --filter @workspace/sharechat-apm-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sharechat-apm-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/sharechat-apm-mobile", "run", "serve" ]

[services.env]
PORT = "24823"
BASE_PATH = "/mobile/"
